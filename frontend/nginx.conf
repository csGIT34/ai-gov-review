server {
    listen 80;
    server_name _;

    # Reverse-proxy API + docs to the api container.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /docs { proxy_pass http://api:8000/docs; }
    location = /openapi.json { proxy_pass http://api:8000/openapi.json; }
    location = /healthz { proxy_pass http://api:8000/healthz; }

    # Static SPA (placeholder until M8).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
