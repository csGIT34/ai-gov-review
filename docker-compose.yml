# AI Governance Review — local dev stack (3 containers: db, api, web).
# Prod uses a managed Postgres + keyless cloud identity (see README / infra).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aigov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-aigov}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aigov}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend]

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aigov:changeme-local-only@db:5432/aigov}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      # Live Azure discovery (M5) — read-only; Reader role suffices. See README.
      AZURE_DISCOVERY: ${AZURE_DISCOVERY:-stub}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      # Short-lived dev bearer (az account get-access-token); managed identity in prod.
      AZURE_ACCESS_TOKEN: ${AZURE_ACCESS_TOKEN:-}
    ports:
      - "8000:8000"   # Swagger at http://localhost:8000/docs
    networks: [backend]

  web:
    build: ./frontend
    depends_on: [api]
    ports:
      - "8080:80"
    networks: [backend]

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
